name: CI

on:
  push:
    branches: ["master"]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".editorconfig"
      - "LICENSE"
  pull_request:
    branches: ["master"]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".editorconfig"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install
        env:
          HUSKY: 0

      - name: Cache Astro build
        uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: ${{ runner.os }}-astro-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-astro-

      - name: Verify Code (Lint + Format + Types)
        run: pnpm run check

      - name: Get Playwright version
        id: playwright-version
        run: |
          PLAYWRIGHT_VERSION=$(pnpm list --depth 0 @playwright/test --json | jq -r '.[0].devDependencies["@playwright/test"].version')
          echo "version=$PLAYWRIGHT_VERSION" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: pnpm run test:e2e

      - name: Build Project
        run: pnpm run build
        env:
          PUBLIC_WEB3FORMS_ACCESS_KEY: "mock_key"
          PUBLIC_CF_ANALYTICS_TOKEN: "mock_token"

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 5
