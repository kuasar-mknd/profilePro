name: "Security Audit"

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "0 9 * * 1" # Run every Monday at 9 AM

permissions:
  contents: read

jobs:
  audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # `pnpm audit` (et son équivalent `bun audit`) reposent sur des endpoints
      # npm retirés (HTTP 410) ; ce script interroge le bulk advisory endpoint
      # de remplacement en lisant directement bun.lock.
      - name: Run Audit
        run: bun run audit
