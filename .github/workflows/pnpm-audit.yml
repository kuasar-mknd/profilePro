name: "Security Audit"

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "0 9 * * 1" # Run every Monday at 9 AM

permissions:
  contents: read

jobs:
  audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      # `pnpm audit` repose sur des endpoints npm retirés (HTTP 410) ;
      # ce script interroge le bulk advisory endpoint de remplacement.
      - name: Run Audit
        run: pnpm run audit
